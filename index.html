  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

vestimentos, distribuição de dividendos ou aquisições.<\u002Fdiv>\n        <div style=\"margin-top:12px;background:#FBEFEF;border-left:3px solid #C13B3B;color:#8A2B2B;font-size:12.5px;border-radius:2px;padding:11px 14px;line-height:1.55;\">Estoques cresceram 21,5% (R$ 9,62 bi → R$ 11,69 bi), ritmo acima do CPV (+11,0%). Isso elevou o prazo de renovação de estoques de 88,1 para 96,5 dias — vale investigar se é acúmulo estratégico (hedge de custos/matéria-prima) ou perda de giro operacional.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== DRE ===================== -->\n    <div style=\"display:{{ dreD }};animation:fadeUp .3s ease;\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;\">\n        <div style=\"background:#fff;border:1px solid #E1E7EC;border-radius:4px;padding:22px;box-shadow:0 1px 2px rgba(5,28,44,.04);\">\n          <h3 style=\"margin:0 0 2px;font-size:15px;color:#051C2C;\">Evolução das Margens<\u002Fh3>\n          <div style=\"color:#7B8794;font-size:12px;margin-bottom:14px;\">Margem Bruta, EBIT e Líquida — 2023 x 2024 (% da ROL)<\u002Fdiv>\n          <canvas id=\"chartMargens\" style=\"max-height:300px;\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E1E7EC;border-radius:4px;padding:22px;box-shadow:0 1px 2px rgba(5,28,44,.04);\">\n          <h3 style=\"margin:0 0 2px;font-size:15px;color:#051C2C;\">Alíquota Efetiva de Imposto de Renda + CSLL<\u002Fh3>\n          <div style=\"color:#7B8794;font-size:12px;margin-bottom:14px;\">IR/CSLL ÷ Lucro Antes dos Impostos (LAIR)<\u002Fdiv>\n          <canvas id=\"chartAliquota\" style=\"max-height:300px;\"><\u002Fcanvas>\n          <div style=\"margin-top:14px;background:#FBEFEF;border-left:3px solid #C13B3B;color:#8A2B2B;font-size:12.5px;border-radius:2px;padding:11px 14px;line-height:1.55;\">A alíquota efetiva de 2023 (0,5%) foi atipicamente baixa — não é o padrão recorrente da companhia. 2024 1px;color:#8B97A4;margin-top:8px;\">Valores em R$ mil<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== INDICADORES ===================== -->\n    <div style=\"display:{{ indicD }};animation:fadeUp .3s ease;\">\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-bottom:18px;\">\n        <div style=\"background:#fff;border:1px solid #E1E7EC;border-radius:4px;padding:22px;box-shadow:0 1px 2px rgba(5,28,44,.04);\">\n          <h3 style=\"margin:0 0 2px;font-size:15px;color:#051C2C;\">Índices de Liquidez<\u002Fh3>\n          <div style=\"color:#7B8794;font-size:12px;margin-bottom:14px;\">2023 x 2024<\u002Fdiv>\n          <canvas id=\"chartLiquidez\" style=\"max-height:300px;\"><\u002Fcanvas>\n          <div style=\"margin-top:14px;background:#EEF4FB;border-left:3px solid #1C6FD6;color:#0A3D62;font-size:12.5px;border-radius:2px;padding:11px 14px;line-height:1.55;\">Capital Circulante Líquido virou de negativo (-R$ 4,44 bi em 2023) para positivo (+R$ 4,77 bi em 2024) — a empresa deixou de depender de recursos de longo prazo/caixa para bancar o giro e passou a ter folga própria no curto prazo.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E1E7EC;border-radius:4px;padding:22px;box-shadow:0 1px 2px rgba(5,28,44,.04);\">\n          <h3 style=\"margin:0 0 2px;font-size:15px;color:#051C2C;\">Posição de Caixa Líquido<\u002Fh3>\n          <div style=\"color:#7B8794;font-size:12px;margin-bottom:14px;\">Dívida Bruta x Caixa e Aplicações Financeiras (R$ bi)<\u002Fdiv>\n          <canvas id=\"chartCaixaLiquido\" style=\"max-height:300px;\"><\u002Fcanvas>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E1E7EC;border-radius:4px;padding:22px;box-shadow:0 1px 2px rgba(5,28,44,.04);\">\n        <h3 style=\"margin:0 0 2px;font-size:15px;color:#051C2C;\">Painel de Indicadores Fundamentalistas<\u002Fh3>\n        <div style=\"color:#7B8794;font-size:12px;margin-bottom:14px;\">Fórmulas, valores 2024/2023 e leitura de risco<\u002Fdiv>\n        <div style=\"max-height:520px;overflow-y:auto;\"><table id=\"tblIndic\" style=\"width:100%;border-collapse:collapse;\"><thead><tr>\n          <th style=\"padding:9px 10px;text-align:left;border-bottom:1px solid #E1E7EC;color:#6A7885;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.4px;\">Indicador<\u002Fth>\n          <th style=\"padding:9px 10px;text-align:left;border-bottom:1px solid #E1E7EC;color:#6A7885;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.4px;\">Fórmula<\u002Fth>\n          <th style=\"padding:9px 10px;text-align:right;border-bottom:1px solid #E1E7EC;color:#6A7885;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.4px;\">2024<\u002Fth>\n          <th style=\"padding:9px 10px;text-align:right;border-bottom:1px solid #E1E7EC;color:#6A7885;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.4px;\">2023<\u002Fth>\n          <th style=\"padding:9px 10px;text-align:left;border-bottom:1px solid #E1E7EC;color:#6A7885;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.4px;\">Leitura<\u002Fth>\n        <\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv>\n        <div style=\"font-size:11px;color:#8B97A4;margin-top:8px;\">Indicadores marcados <span style=\"display:inline-block;padding:2px 8px;border-radius:2px;font-size:10px;font-weight:600;background:#EEF4FB;color:#1C6FD6;\">recalculado<\u002Fspan> estavam zerados/incompletos para 2024 na planilha original e foram recompostos pela equipe FLOW 360 com a mesma metodologia aplicada a 2023, a partir das contas do Balanço Patrimonial de 31/12/2024.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #E1E7EC;border-radius:4px;padding:22px;box-shadow:0 1px 2px rgba(5,28,44,.04);margin-top:18px;\">\n        <h3 style=\"margin:0 0 2px;font-size:15px;color:#051C2C;\">Leitura Estratégica para o Investidor<\u002Fh3>\n        <div style=\"color:#7B8794;font-size:12px;margin-bottom:16px;\">Síntese fundamentalista — exercício 2024<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\">\n          <div style=\"background:#F6F8FA;border:1px solid #E4EAEF;border-radius:3px;padding:18px;\">\n            <div style=\"width:28px;height:28px;border-radius:2px;background:#051C2C;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-bottom:12px;\">1<\u002Fdiv>\n            <strong style=\"color:#051C2C;font-size:13.5px;\">Operação saudável, tributo é a variável do ano<\u002Fstrong>\n            <p style=\"color:#5C6B78;font-size:12.5px;line-height:1.55;margin:8px 0 0;\">Receita, margem bruta e EBIT melhoraram. O lucro líquido estagnou por normalização da alíquota efetiva de IR/CSLL (0,5% → 23,8%), não por perda operacional. Modele 2025 com alíquota efetiva próxima de 24-30%, não repita a base de 2023.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#F6F8FA;border:1px solid #E4EAEF;border-radius:3px;padding:18px;\">\n            <div style=\"width:28px;height:28px;border-radius:2px;background:#1C6FD6;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-bottom:12px;\">2<\u002Fdiv>\n            <strong style=\"color:#051C2C;font-size:13.5px;\">Caixa líquido positivo e crescente<\u002Fstrong>\n            <p style=\"color:#5C6B78;font-size:12.5px;line-height:1.55;margin:8px 0 0;\">Caixa líquido de R$ 26,57 bi (dívida bruta de apenas R$ 3,45 bi) dá musculatura para M&amp;A, buybacks ou aumento de dividendos sem pressionar o balanço. Monitorar a política de alocação desse excedente.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#F6F8FA;border:1px solid #E4EAEF;border-radius:3px;padding:18px;\">\n            <div style=\"width:28px;height:28px;border-radius:2px;background:#00A5A8;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-bottom:12px;\">3<\u002Fdiv>\n            <strong style=\"color:#051C2C;font-size:13.5px;\">Giro de estoque merece acompanhamento<\u002Fstrong>\n            <p style=\"color:#5C6B78;font-size:12.5px;line-height:1.55;margin:8px 0 0;\">Renovação de estoques subiu de 88 para ~96 dias. Recomenda-se abrir a composição por categoria de produto no próximo ciclo para confirmar se é decisão estratégica de compras ou sinal de desaceleração de giro.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <footer style=\"text-align:center;color:#8B97A4;font-size:11px;padding:26px 40px;border-top:1px solid #E1E7EC;line-height:1.7;background:#fff;\">\n    Dashboard elaborado por Lisandra Rosa · FLOW 360 — a partir das Demonstrações Financeiras Padronizadas (DFP) consolidadas da AMBEV S.A., exercícios findos em 31/12/2024 e 31/12/2023.<br>\n    Uso externo/informativo. Não constitui recomendação de investimento. Para decisões de alocação, valide as DFPs oficiais na CVM/B3 e consulte um profissional certificado (CNPI/CFA).\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { active: 'visao' };\n\n  renderVals() {\n    const active = this.state.active;\n    const tabs = [\n      { id: 'visao', label: 'Visão Geral' },\n      { id: 'balanco', label: 'Balanço Patrimonial' },\n      { id: 'dre', label: 'DRE' },\n      { id: 'indicadores', label: 'Indicadores & Solvência' },\n    ];\n    const base = 'padding:9px 18px;border-radius:2px;font-size:13px;cursor:pointer;transition:.15s;font-family:inherit;';\n    const tabItems = tabs.map(t => ({\n      label: t.label,\n      onClick: () => this.setState({ active: t.id }),\n      style: t.id === active\n        ? base + 'background:#051C2C;border:1px solid #051C2C;color:#fff;font-weight:600;'\n        : base + 'background:#fff;border:1px solid #D7DFE5;color:#5C6B78;font-weight:500;',\n    }));\n    return {\n      tabItems,\n      visaoD: active === 'visao' ? 'block' : 'none',\n      balancoD: active === 'balanco' ? 'block' : 'none',\n      dreD: active === 'dre' ? 'block' : 'none',\n      indicD: active === 'indicadores' ? 'block' : 'none',\n    };\n  }\n\n  componentDidMount() {\n    if (typeof Chart === 'undefined') { setTimeout(() => this.componentDidMount(), 120); return; }\n    this.build();\n  }\n\n  build() {\n    // ---- palette (McKinsey-inspired) ----\n    const NAVY='#051C2C', DEEPBLUE='#034B6F', BLUE='#1C6FD6', TEAL='#00A5A8',\n          SKY='#6EB6DE', SLATE='#2B4A6F', RED='#C13B3B', GREY='#B7C3CB', S2023='#B7C3CB';\n\n    Chart.defaults.color = '#6A7885';\n    Chart.defaults.borderColor = '#E6EBEF';\n    Chart.defaults.font.family = \"'Helvetica Neue', Helvetica, Arial, sans-serif\";\n\n    const fmtNum = v => { const a = Math.round(Math.abs(v)).toLocaleString('pt-BR'); return v<0 ? '('+a+')' : a; };\n    const fmtBi = v => { const a = Math.abs(v/1e6).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); return (v<0?'(R$ '+a+' bi)':'R$ '+a+' bi'); };\n    const fmtPct = v => (v===null||v===undefined||isNaN(v)) ? '—' : v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';\n    const fmtRatio = v => v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});\n    const fmtDias = v => v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' dias';\n\n    // ---- financial tables ----\n    const dreRows = [\n      ['Receita de Venda de Bens e/ou Serviços (Receita Bruta)', 134130924, 120117628, 'normal'],\n      ['(-) Deduções da Receita Bruta', -44678255, -40380772, 'normal'],\n      ['   Tributos sobre Vendas', -27417943, -25227478, 'normal'],\n      ['   Descontos', -17260312, -15153294, 'normal'],\n      ['Receita Operacional Líquida (ROL)', 89452669, 79736856, 'subtotal'],\n      ['(-) Custo dos Produtos Vendidos (CPV)', -43615080, -39291571, 'normal'],\n      ['Lucro Bruto', 45837589, 40445285, 'subtotal'],\n      ['(-) Despesas de Logística', -11557161, -10750586, 'normal'],\n      ['(-) Despesas Comerciais', -8634163, -7412463, 'normal'],\n      ['(-) Despesas Administrativas', -6201074, -5273670, 'normal'],\n      ['(+) Outras Receitas Operacionais', 2457262, 2028888, 'normal'],\n      ['(-) Itens Não Usuais', -100795, -206356, 'normal'],\n      ['Lucro Operacional (EBIT)', 21801658, 18831098, 'subtotal'],\n      ['(-) Despesas Financeiras', -4510782, -6280052, 'normal'],\n      ['(+) Receitas Financeiras', 2605338, 2670300, 'normal'],\n      ['(-) Outros Resultados Financeiros Líquidos', -408887, -185406, 'normal'],\n      ['Lucro Antes dos Impostos sobre o Lucro (LAIR)', 19487327, 15035940, 'subtotal'],\n      ['(-) Imposto de Renda e Contribuição Social', -4640375, -75481, 'normal'],\n      ['Lucro Líquido do Exercício (Consolidado)', 14846952, 14960459, 'total'],\n    ];\n    const ativoRows = [\n      ['Ativo Circulante', 54155784, 36563050, 'subtotal'],\n      ['   Caixa e Equivalentes de Caixa', 28595666, 16059003, 'normal'],\n      ['   Aplicações Financeiras', 1242001, 277164, 'normal'],\n      ['   Clientes / Contas a Receber', 6269863, 5741457, 'normal'],\n      ['   Instrumentos Financeiros Derivativos', 1218561, 378049, 'normal'],\n      ['   Estoques', 11689767, 9619022, 'normal'],\n      ['   Tributos a Recuperar', 3582275, 3435688, 'normal'],\n      ['   Outros Ativos Circulantes', 1557651, 1052667, 'normal'],\n      ['Ativo Não Circulante', 108352165, 96081083, 'subtotal'],\n      ['   Realizável a Longo Prazo', 20913198, 21116491, 'normal'],\n      ['   Investimentos', 395393, 289063, 'normal'],\n      ['   Imobilizado', 30170194, 26630156, 'normal'],\n      ['   Intangível', 12530712, 10041733, 'normal'],\n      ['   Ágio', 44342668, 38003640, 'normal'],\n      ['TOTAL DO ATIVO', 162507949, 132644133, 'total'],\n    ];\n    const passivoRows = [\n      ['Passivo Circulante', 49388714, 41004897, 'subtotal'],\n      ['   Contas a Pagar', 25223522, 23195101, 'normal'],\n      ['   Instrumentos Financeiros Derivativos', 204721, 751362, 'normal'],\n      ['   Empréstimos e Financiamentos', 1276391, 1298091, 'normal'],\n      ['   Salários e Encargos', 2779753, 2128547, 'normal'],\n      ['   Dividendos e Juros sobre Cap. Próprio', 8487242, 1526151, 'normal'],\n      ['   IR e CSL a Pagar', 1941540, 1340492, 'normal'],\n      ['   Impostos, Taxas e Contribuições', 5648399, 6236626, 'normal'],\n      ['   Participação em Controlada e Outros Passivos', 3386235, 4110138, 'normal'],\n      ['   Provisões', 440911, 418389, 'normal'],\n      ['Passivo Não Circulante', 13538721, 11495434, 'subtotal'],\n      ['   Contas a Pagar', 327706, 307300, 'normal'],\n      ['   Instrumentos Financeiros Derivativos', 6720, 11643, 'normal'],\n      ['   Empréstimos e Financiamentos', 2176337, 2202975, 'normal'],\n      ['   IR e CSL Diferidos', 5007711, 3318448, 'normal'],\n      ['   IR e CSL a Recolher', 1372387, 1487125, 'normal'],\n      ['   Impostos, Taxas e Contrib. a Recolher', 597449, 513315, 'normal'],\n      ['   Opção de Venda Concedida', 1142775, 1083221, 'normal'],\n      ['   Provisões', 670904, 559614, 'normal'],\n      ['   Benefícios a Funcionários', 2236732, 2011793, 'normal'],\n      ['Total do Passivo (Capitais de Terceiros)', 62927435, 52500331, 'subtotal'],\n      ['Patrimônio Líquido (Capital Próprio)', 99580514, 80143802, 'subtotal'],\n      ['   Capital Social Realizado', 58226036, 58177929, 'normal'],\n      ['   Reservas', 108973429, 98669404, 'normal'],\n      ['   Ajuste de Avaliação Patrimonial', -68557326, -77878043, 'normal'],\n      ['   Participação de Não Controladores', 938375, 1174512, 'normal'],\n      ['TOTAL DO PASSIVO + PATRIMÔNIO LÍQUIDO', 162507949, 132644133, 'total'],\n    ];\n\n    const tdN = 'padding:8px 10px;border-bottom:1px solid #EEF1F4;font-size:12.5px;color:#26333F;';\n    const tdNum = tdN + 'text-align:right;font-variant-numeric:tabular-nums;';\n    const renderFinTable = (sel, rows, b24, b23) => {\n      const tbody = document.querySelector(sel);\n      if (!tbody) return;\n      tbody.innerHTML = rows.map(r => {\n        const [label, v24, v23, tipo] = r;\n        const av24 = b24 ? (v24/b24*100) : null;\n        const av23 = b23 ? (v23/b23*100) : null;\n        const ah = (v23!==0) ? ((v24/v23-1)*100) : null;\n        let lblExtra='', numExtra='', trExtra='';\n        if (tipo==='subtotal'){ lblExtra='font-weight:700;color:#051C2C;'; numExtra='font-weight:700;color:#051C2C;'; trExtra='border-top:1px solid #D3DCE2;'; }\n        if (tipo==='total'){ lblExtra='font-weight:700;color:#051C2C;'; numExtra='font-weight:700;color:#051C2C;'; trExtra='border-top:2px solid #051C2C;background:#F2F6FA;'; }\n        const L = tdN + lblExtra + trExtra;\n        const N = tdNum + numExtra + trExtra;\n        return `<tr><td style=\"${L}\">${label}<\u002Ftd><td style=\"${N}\">${fmtNum(v24)}<\u002Ftd><td style=\"${N}\">${fmtPct(av24)}<\u002Ftd><td style=\"${N}\">${fmtNum(v23)}<\u002Ftd><td style=\"${N}\">${fmtPct(av23)}<\u002Ftd><td style=\"${N}\">${fmtPct(ah)}<\u002Ftd><\u002Ftr>`;\n      }).join('');\n    };\n    renderFinTable('#tblDRE tbody', dreRows, 89452669, 79736856);\n    renderFinTable('#tblAtivo tbody', ativoRows, 162507949, 132644133);\n    renderFinTable('#tblPassivo tbody', passivoRows, 162507949, 132644133);\n\n    // ---- indicators ----\n    const AC24=54155784, PC24=49388714, RLP24=20913198, PNC24=13538721, PL24=99580514,\n          Est24=11689767, Cli24=6269863, CPV24=43615080, RB24=134130924, LL24=14846952, ROL24=89452669, ATV24=162507949;\n    const AC23=36563050, PC23=41004897, RLP23=21116491, PNC23=11495434, PL23=80143802,\n          Est23=9619022, Cli23=5741457, CPV23=39291571, RB23=120117628, LL23=14960459, ROL23=79736856;\n    const liqCorrente24=AC24/PC24, liqCorrente23=AC23/PC23;\n    const liqSeca24=(AC24-Est24)/PC24, liqSeca23=(AC23-Est23)/PC23;\n    const liqGeral24=(AC24+RLP24)/(PC24+PNC24), liqGeral23=(AC23+RLP23)/(PC23+PNC23);\n    const ccl24=AC24-PC24, ccl23=AC23-PC23;\n    const prazoVendas24=(Cli24/RB24)*360, prazoVendas23=(Cli23/RB23)*360;\n    const renovEstoque24=(Est24/CPV24)*360, renovEstoque23=(Est23/CPV23)*360;\n    const endivGeral24=(PC24+PNC24)/ATV24*100, endivGeral23=(PC23+PNC23)/(PC23+PNC23+PL23)*100;\n    const partTerceiros24=(PC24+PNC24)/PL24*100, partTerceiros23=(PC23+PNC23)/PL23*100;\n    const roe24=LL24/PL24*100, roe23=LL23/PL23*100;\n    const margemLiq24=LL24/ROL24*100, margemLiq23=LL23/ROL23*100;\n\n    const indicRows = [\n      ['Liquidez Corrente', 'Ativo Circulante ÷ Passivo Circulante', fmtRatio(liqCorrente24), fmtRatio(liqCorrente23), 'Para cada R$1 de dívida de curto prazo, a empresa tem R$1,10 em ativos de curto prazo (2024) — folga positiva, revertendo o quadro apertado de 2023.', false],\n      ['Liquidez Seca', '(Ativo Circulante - Estoques) ÷ Passivo Circulante', fmtRatio(liqSeca24), fmtRatio(liqSeca23), 'Mesmo excluindo estoques, a cobertura de curto prazo melhorou de 0,66 para 0,86 — ainda abaixo de 1,0, mas em trajetória de recuperação.', false],\n      ['Liquidez Geral', '(Ativo Circ. + Realiz. LP) ÷ (Passivo Circ. + Não Circ.)', fmtRatio(liqGeral24), fmtRatio(liqGeral23), 'Cobertura de 1,19x das dívidas totais por ativos realizáveis — posição confortável no longo prazo.', true],\n      ['Capital Circulante Líquido (CCL)', 'Ativo Circulante - Passivo Circulante', fmtBi(ccl24), fmtBi(ccl23), 'CCL virou positivo (R$ 4,77 bi) após ser negativo em 2023 (-R$ 4,44 bi) — sinal claro de fortalecimento do capital de giro.', false],\n      ['Prazo Médio de Vendas (Recebimento)', '(Clientes ÷ Receita Bruta) × 360', fmtDias(prazoVendas24), fmtDias(prazoVendas23), 'Recebimento levemente mais rápido (16,8 vs 17,2 dias) — eficiência de cobrança estável/melhorando.', true],\n      ['Renovação de Estoques', '(Estoques ÷ CPV) × 360', fmtDias(renovEstoque24)+' ('+fmtRatio(360/renovEstoque24)+' giros/ano)', fmtDias(renovEstoque23)+' ('+fmtRatio(360/renovEstoque23)+' giros/ano)', 'Giro caiu de 4,09 para 3,73 vezes ao ano — estoque crescendo mais rápido que o custo das vendas, ponto de atenção operacional.', true],\n      ['Endividamento Geral', '(Passivo Circ. + Não Circ.) ÷ Ativo Total', fmtPct(endivGeral24), fmtPct(endivGeral23), '38,7% do Ativo é financiado por terceiros (vs 39,6% em 2023) — endividamento moderado e em leve queda.', false],\n      ['Participação de Capitais de Terceiros', '(Passivo Circ. + Não Circ.) ÷ Patrimônio Líquido', fmtPct(partTerceiros24), fmtPct(partTerceiros23), 'Para cada R$1 de capital próprio, há R$0,63 de capital de terceiros (vs R$0,66 em 2023, equivalente a 65,5%) — menor dependência relativa de terceiros.', true],\n      ['ROE — Rentabilidade do Patrimônio Líquido', 'Lucro Líquido ÷ Patrimônio Líquido', fmtPct(roe24), fmtPct(roe23), 'ROE caiu 3,8 p.p. (18,7% → 14,9%). Efeito majoritário: normalização da alíquota efetiva de IR/CSLL, não deterioração operacional — ver aba DRE.', false],\n      ['Margem Líquida', 'Lucro Líquido ÷ Receita Operacional Líquida', fmtPct(margemLiq24), fmtPct(margemLiq23), 'Margem líquida de 16,6% (vs 18,8%) — compressão concentrada na linha de impostos sobre o lucro.', false],\n    ];\n    const tblIndic = document.querySelector('#tblIndic tbody');\n    if (tblIndic) tblIndic.innerHTML = indicRows.map(r => {\n      const badge = r[5] ? ' <span style=\"display:inline-block;padding:2px 8px;border-radius:2px;font-size:10px;font-weight:600;background:#EEF4FB;color:#1C6FD6;\">recalculado<\u002Fspan>' : '';\n      return `<tr>`+\n        `<td style=\"${tdN}font-weight:600;color:#051C2C;\">${r[0]}${badge}<\u002Ftd>`+\n        `<td style=\"${tdN}color:#7B8794;font-size:11.5px;\">${r[1]}<\u002Ftd>`+\n        `<td style=\"${tdNum}font-weight:600;color:#051C2C;\">${r[2]}<\u002Ftd>`+\n        `<td style=\"${tdNum}color:#5C6B78;\">${r[3]}<\u002Ftd>`+\n        `<td style=\"${tdN}color:#5C6B78;font-size:11.5px;max-width:280px;\">${r[4]}<\u002Ftd>`+\n      `<\u002Ftr>`;\n    }).join('');\n\n    // ---- charts ----\n    const mk = (id, cfg) => {\n      const el = document.getElementById(id);\n      if (!el) return;\n      const prev = Chart.getChart(el);\n      if (prev) prev.destroy();\n      new Chart(el, cfg);\n    };\n\n    mk('chartDRE', {\n      type:'bar',\n      data:{\n        labels:['ROL','(-) CPV','Lucro Bruto','(-) Desp. Operac. Líq.','EBIT','(-) Result. Financ. Líq.','LAIR','(-) IR/CSLL','Lucro Líquido'],\n        datasets:[{ label:'R$ bi',\n          data:[89.452669,-43.615080,45.837589,-24.035931,21.801658,-2.314331,19.487327,-4.640375,14.846952],\n          backgroundColor:[BLUE,RED,TEAL,RED,TEAL,RED,TEAL,RED,NAVY], borderRadius:2 }]\n      },\n      options:{ responsive:true,\n        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'R$ '+c.raw.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' bi'}}},\n        scales:{y:{ticks:{callback:v=>'R$ '+v+'bi'}},x:{ticks:{autoSkip:false,maxRotation:35,minRotation:35,font:{size:10}}}} }\n    });\n\n    mk('chartEvolucao', {\n      type:'bar',\n      data:{ labels:['Receita Líq. (ROL)','EBIT','Lucro Líquido'],\n        datasets:[\n          {label:'2023',data:[79.736856,18.831098,14.960459],backgroundColor:S2023,borderRadius:2},\n          {label:'2024',data:[89.452669,21.801658,14.846952],backgroundColor:BLUE,borderRadius:2}\n        ]},\n      options:{plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>c.dataset.label+': R$ '+c.raw.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' bi'}}},scales:{y:{ticks:{callback:v=>'R$ '+v+'bi'}}}}\n    });\n\n    mk('chartAtivoComp', {\n      type:'doughnut',\n      data:{ labels:['Ativo Circulante (33,3%)','Realizável a LP (12,9%)','Investimentos (0,2%)','Imobilizado (18,6%)','Intangível (7,7%)','Ágio (27,3%)'],\n        datasets:[{data:[54.155784,20.913198,0.395393,30.170194,12.530712,44.342668],backgroundColor:[BLUE,SKY,GREY,DEEPBLUE,TEAL,NAVY],borderColor:'#fff',borderWidth:2}]},\n      options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:10.5}}},tooltip:{callbacks:{label:c=>c.label.split(' (')[0]+': R$ '+c.raw.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' bi'}}}}\n    });\n\n    mk('chartCapital', {\n      type:'doughnut',\n      data:{ labels:['Patrimônio Líquido — Capital Próprio (61,3%)','Passivo Total — Capital de Terceiros (38,7%)'],\n        datasets:[{data:[99.580514,62.927435],backgroundColor:[NAVY,SKY],borderColor:'#fff',borderWidth:2}]},\n      options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:10.5}}},tooltip:{callbacks:{label:c=>c.label.split(' (')[0]+': R$ '+c.raw.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' bi'}}}}\n    });\n\n    mk('chartAtivoDetalhe', {\n      type:'doughnut',\n      data:{ labels:['Ativo Circulante (33,3%)','Ativo Não Circulante (66,7%)'],\n        datasets:[{data:[54.155784,108.352165],backgroundColor:[BLUE,NAVY],borderColor:'#fff',borderWidth:2}]},\n      options:{plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>c.label.split(' (')[0]+': R$ '+c.raw.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' bi'}}}}\n    });\n\n    mk('chartPassivoComp', {\n      type:'doughnut',\n      data:{ labels:['Passivo Circulante (30,4%)','Passivo Não Circulante (8,3%)','Patrimônio Líquido (61,3%)'],\n        datasets:[{data:[49.388714,13.538721,99.580514],backgroundColor:[BLUE,SKY,NAVY],borderColor:'#fff',borderWidth:2}]},\n      options:{plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>c.label.split(' (')[0]+': R$ '+c.raw.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' bi'}}}}\n    });\n\n    mk('chartMargens', {\n      type:'bar',\n      data:{ labels:['Margem Bruta','Margem EBIT','Margem Líquida'],\n        datasets:[\n          {label:'2023',data:[50.72,23.62,18.76],backgroundColor:S2023,borderRadius:2},\n          {label:'2024',data:[51.24,24.37,16.60],backgroundColor:BLUE,borderRadius:2}\n        ]},\n      options:{plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.raw.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%'}}},scales:{y:{ticks:{callback:v=>v+'%'}}}}\n    });\n\n    mk('chartAliquota', {\n      type:'bar',\n      data:{ labels:['2023','2024'], datasets:[{label:'Alíquota efetiva',data:[0.50,23.81],backgroundColor:[SKY,BLUE],borderRadius:2}]},\n      options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'%'}}},scales:{y:{ticks:{callback:v=>v+'%'}}}}\n    });\n\n    mk('chartLiquidez', {\n      type:'bar',\n      data:{ labels:['Liquidez Corrente','Liquidez Seca','Liquidez Geral'],\n        datasets:[\n          {label:'2023',data:[0.8917,0.6571,1.0987],backgroundColor:S2023,borderRadius:2},\n          {label:'2024',data:[1.0965,0.8598,1.1929],backgroundColor:BLUE,borderRadius:2}\n        ]},\n      options:{plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.raw.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}}}}\n    });\n\n    mk('chartCaixaLiquido', {\n      type:'bar',\n      data:{ labels:['2023','2024'],\n        datasets:[\n          {label:'Dívida Bruta',data:[3.501066,3.452728],backgroundColor:RED,borderRadius:2},\n          {label:'Caixa + Aplicações Financeiras',data:[16.578335,30.022121],backgroundColor:TEAL,borderRadius:2},\n          {label:'Caixa Líquido',data:[13.077269,26.569393],backgroundColor:NAVY,borderRadius:2}\n        ]},\n      options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:10.5}}},tooltip:{callbacks:{label:c=>c.dataset.label+': R$ '+c.raw.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' bi'}}},scales:{y:{ticks:{callback:v=>'R$ '+v+'bi'}}}}\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
